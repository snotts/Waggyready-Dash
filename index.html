<script>
window.storage = {
  get: function(key) {
    return new Promise(function(resolve, reject) {
      try {
        var val = localStorage.getItem(key);
        if (val === null) { reject(new Error("Key not found: " + key)); return; }
        resolve({ key: key, value: val, shared: false });
      } catch(e) { reject(e); }
    });
  },
  set: function(key, value) {
    return new Promise(function(resolve, reject) {
      try {
        localStorage.setItem(key, typeof value === "string" ? value : JSON.stringify(value));
        resolve({ key: key, value: value, shared: false });
      } catch(e) { reject(e); }
    });
  },
  delete: function(key) {
    return new Promise(function(resolve) {
      localStorage.removeItem(key);
      resolve({ key: key, deleted: true });
    });
  },
  list: function(prefix) {
    return new Promise(function(resolve) {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      resolve({ keys: keys });
    });
  }
};
</script>

            <select value={editCh} onChange={e=>{setEditCh(Number(e.target.value));setEditKey("p0");}} style={{width:"100%",border:"1.5px solid #C8860A",borderRadius:5,padding:"5px 7px",fontSize:11,fontFamily:"sans-serif",color:"#3D2010",background:"#fff"}}>{chs.map(c=><option key={c.num} value={c.num}>Ch{c.num} — {c.title}</option>)}</select></div>
            <div><div style={{fontSize:8,fontFamily:"sans-serif",fontWeight:"bold",color:"#9B7B5E",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Element</div>
            <select value={editKey} onChange={e=>setEditKey(e.target.value)} style={{width:"100%",border:"1.5px solid #C8860A",borderRadius:5,padding:"5px 7px",fontSize:11,fontFamily:"sans-serif",color:"#3D2010",background:"#fff"}}>
              <optgroup label="Body">{bodyOpts.map(o=><option key={o.key} value={o.key}>{o.label}</option>)}</optgroup>
              <optgroup label="Slots">{slotOpts.map(o=><option key={o.key} value={o.key}>{o.label}</option>)}</optgroup>
            </select></div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
            <span style={{fontSize:10,fontFamily:"sans-serif",fontWeight:"bold",color:"#7A4A30"}}>{label}</span>
            <div style={{display:"flex",alignItems:"center",gap:5}}><Bdg t={editTxt} lim={WL[slotKey]}/>{iss.length>0&&<span style={{fontSize:9,color:"#EF4444",fontFamily:"sans-serif",fontWeight:"bold"}}>⚠ {iss.length}</span>}</div>
          </div>
          <textarea value={editTxt} onChange={e=>{setEditTxt(e.target.value);setEditSaved(false);}} style={{width:"100%",minHeight:120,border:`1.5px solid ${iss.length>0?"#EF4444":"#C8860A"}`,borderRadius:6,padding:"9px 11px",fontSize:12,fontFamily:"Georgia,serif",color:"#3D2010",background:"#FDF8F0",resize:"vertical",boxSizing:"border-box",lineHeight:1.65}}/>
          {iss.length>0&&<div style={{marginTop:4,display:"flex",flexDirection:"column",gap:3}}>{iss.map((x,i)=><div key={i} style={{fontSize:9,fontFamily:"sans-serif",borderLeft:"3px solid #EF4444",paddingLeft:6,color:"#EF4444"}}><strong>{x.label}</strong> — "{x.found}" — {x.fix}</div>)}</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:8}}>
            <button onClick={()=>{const ch2=chs.find(c=>c.num===editCh);if(!ch2)return;setEditTxt(isBody?(ch2.p?.[pIdx]||""):(ch2.s?.[sk]||""));setEditSaved(false);}} style={{...btn("#FFF8EE","#7A4A30"),border:"1.5px solid #C8860A",borderRadius:6,padding:"7px 0",fontSize:11,fontWeight:"bold"}}>Revert</button>
            <button onClick={saveEdit} style={{...btn(editSaved?"#10B981":"#7A4A30","#FDF8F0"),borderRadius:6,padding:"7px 0",fontSize:11,fontWeight:"bold"}}>{editSaved?"✓ Saved":"Save"}</button>
          </div>
        </div>;
      })()}

      {/* ═══ LINKS ═══ */}
      {activeTab==="links"&&(()=>{
        const goFix=(r)=>{
          const ch=chs.find(c=>c.num===r.ch);
          const p5=ch?.p?.[4]||"";
          setTab("tracker");
          setExp(r.ch);
          setStab(prev=>({...prev,[r.ch]:"body"}));
          setInlE({cn:r.ch,key:"p4",src:"p",lim:55,ital:false});
          setInlTxt(p5);
        };
        const results=RESOURCE_MAP.map(r=>{
          const ch=chs.find(c=>c.num===r.ch);
          const allText=ch?[...(ch.p||[]),ch.s?.opening||"",ch.s?.encourage1||"",ch.s?.encourage2||"",ch.s?.quote||"",ch.s?.tip||""].join(" "):"";
          const found=allText.includes(r.phrase);
          const pending=!ch||ch.status!=="completed";
          const extras=chs.filter(c=>c.num!==r.ch&&c.status==="completed").filter(c=>{
            const t=[...(c.p||[]),c.s?.opening||"",c.s?.encourage1||"",c.s?.encourage2||"",c.s?.quote||"",c.s?.tip||""].join(" ");
            return t.includes(r.phrase);
          }).map(c=>c.num);
          return{...r,found,pending,extras};
        });
        const pass=results.filter(r=>r.found).length;
        const fail=results.filter(r=>!r.found&&!r.pending).length;
        const pend=results.filter(r=>r.pending).length;
        return <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginBottom:10}}>
            {[{lbl:"Pass",n:pass,bg:"#ECFDF5",bc:"#10B981",fc:"#065F46"},{lbl:"Fail",n:fail,bg:"#FEF2F2",bc:"#EF4444",fc:"#991B1B"},{lbl:"Pending",n:pend,bg:"#FFF8EE",bc:"#C8860A",fc:"#7A4A30"}].map(({lbl,n,bg,bc,fc})=>(
              <div key={lbl} style={{background:bg,border:`2px solid ${bc}`,borderRadius:7,padding:"6px 4px",textAlign:"center"}}>
                <div style={{fontSize:17,fontWeight:"bold",color:fc,fontFamily:"sans-serif"}}>{n}</div>
                <div style={{fontSize:8,color:fc,fontFamily:"sans-serif",textTransform:"uppercase",letterSpacing:1}}>{lbl}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {results.map(r=>{
              const status=r.pending?"pending":r.found?"pass":"fail";
              const bg=status==="pass"?"#F0FDF4":status==="fail"?"#FFF5F5":"#FFFBF0";
              const bc=status==="pass"?"#A7F3D0":status==="fail"?"#FECACA":"#FDE68A";
              const ic=status==="pass"?"✅":status==="fail"?"❌":"⏳";
              return <div key={r.key} style={{background:bg,border:`1.5px solid ${bc}`,borderRadius:7,padding:"8px 10px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                  <span style={{fontSize:12}}>{ic}</span>
                  <span style={{fontSize:10,fontWeight:"bold",color:"#3D2010",fontFamily:"sans-serif",flex:1}}>{r.label}</span>
                  <span style={{fontSize:9,fontFamily:"sans-serif",color:"#9B7B5E"}}>Ch{r.ch}</span>
                </div>
                <div style={{fontSize:9,color:"#7A6555",fontFamily:"Georgia,serif",fontStyle:"italic",paddingLeft:18,lineHeight:1.4,marginBottom:status==="fail"?5:0}}>"{r.phrase}"</div>
                {status==="fail"&&<>
                  <div style={{fontSize:8,color:"#7A4A30",fontFamily:"sans-serif",paddingLeft:18,marginBottom:6,lineHeight:1.4}}>
                    Weave <strong>"{r.phrase}"</strong> into P5 of Ch{r.ch} — phrase must appear in prose to activate the link.
                  </div>
                  <div style={{display:"flex",gap:5,paddingLeft:18}}>
                    <button onClick={()=>goFix(r)} style={{flex:2,background:"#7A4A30",color:"#FDF8F0",border:"none",borderRadius:5,padding:"5px 0",fontSize:9,fontWeight:"bold",cursor:"pointer",fontFamily:"sans-serif"}}>✏ Fix in P5 — Ch{r.ch}</button>
                    <button onClick={()=>navigator.clipboard?.writeText(r.phrase).catch(()=>{})} style={{flex:1,background:"#F5EDE0",color:"#7A4A30",border:"1px solid #C4A882",borderRadius:5,padding:"5px 0",fontSize:9,cursor:"pointer",fontFamily:"sans-serif"}}>Copy phrase</button>
                  </div>
                </>}
                {r.found&&r.extras.length>0&&<div style={{fontSize:8,color:"#10B981",fontFamily:"sans-serif",paddingLeft:18,marginTop:2}}>Also referenced in Ch{r.extras.join(", Ch")}</div>}
                {status==="pending"&&<div style={{fontSize:8,color:"#92400E",fontFamily:"sans-serif",paddingLeft:18,marginTop:2}}>Ch{r.ch} not yet written — add phrase to P5 when chapter is ready</div>}
              </div>;
            })}
          </div>
          {fail>0&&<div style={{marginTop:8,background:"#FEF2F2",border:"1.5px solid #EF4444",borderRadius:6,padding:"7px 10px",fontSize:10,fontFamily:"sans-serif",color:"#991B1B",fontWeight:"bold",textAlign:"center"}}>⚠️ {fail} broken link{fail>1?"s":""} — fix before building PDF</div>}
          {fail===0&&pass>0&&<div style={{marginTop:8,background:"#F0FDF4",border:"1.5px solid #10B981",borderRadius:6,padding:"7px 10px",fontSize:10,fontFamily:"sans-serif",color:"#065F46",fontWeight:"bold",textAlign:"center"}}>✅ All verified links pass</div>}
        </div>;
      })()}

      {/* ═══ WAGGY ═══ */}
      {activeTab==="waggy"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:10}}>
          {[["Total",wcE.length],["Door",wcE.filter(e=>e.cat==="Door Moments").length],["Owner",wcE.filter(e=>e.cat==="Owner Language").length]].map(([lbl,n])=>(
            <div key={lbl} style={{background:"#FFF8EE",border:"1.5px solid #C8860A",borderRadius:7,padding:"7px 5px",textAlign:"center"}}>
              <div style={{fontSize:19,fontWeight:"bold",color:"#7A4A30",fontFamily:"sans-serif"}}>{n}</div>
              <div style={{fontSize:8,color:"#9B7B5E",fontFamily:"sans-serif",textTransform:"uppercase",letterSpacing:1}}>{lbl}</div>
            </div>
          ))}
        </div>
        <div style={{background:"#FFF8EE",border:"1.5px solid #C8860A",borderRadius:9,padding:"11px",marginBottom:12}}>
          <div style={{fontSize:9,fontFamily:"sans-serif",fontWeight:"bold",color:"#7A4A30",textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Add Entry</div>
          <textarea value={wcIn} onChange={e=>{setWcIn(e.target.value);setWcScan(null);}} placeholder="Type owner language here..." style={{width:"100%",minHeight:65,border:"1.5px solid #C8860A",borderRadius:6,padding:"8px 10px",fontSize:12,fontFamily:"Georgia,serif",color:"#3D2010",background:"#fff",resize:"vertical",boxSizing:"border-box",lineHeight:1.6}}/>
          {wcScan!==null&&<div style={{marginTop:5,marginBottom:5}}>{wcScan.length===0?<div style={{background:"#ECFDF5",border:"1px solid #A7F3D0",borderRadius:5,padding:"5px 9px",fontSize:10,fontFamily:"sans-serif",color:"#065F46",fontWeight:"bold"}}>✓ Clean</div>:<div style={{background:"#FFF5F5",border:"1px solid #FECACA",borderRadius:5,padding:"6px 9px"}}><div style={{fontSize:9,fontFamily:"sans-serif",fontWeight:"bold",color:"#991B1B",marginBottom:4}}>⚠ {wcScan.length} flag{wcScan.length!==1?"s":""}</div>{wcScan.map((x,i)=><div key={i} style={{fontSize:9,color:"#EF4444",borderLeft:"2px solid #EF4444",paddingLeft:6,marginBottom:3}}>"{x.found}" — {x.fix}</div>)}</div>}</div>}
          <div style={{display:"flex",gap:6,marginTop:7,alignItems:"center"}}>
            <select value={wcCat} onChange={e=>setWcCat(e.target.value)} style={{flex:1,border:"1.5px solid #C8860A",borderRadius:6,padding:"6px 8px",fontSize:11,fontFamily:"sans-serif",color:"#3D2010",background:"#fff"}}>{WC_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select>
            <button onClick={()=>{if(!wcIn.trim())return;const hits=chk(wcIn);setWcScan(hits);if(hits.length===0){setWcE(prev=>[{id:Date.now(),text:wcIn.trim(),cat:wcCat,date:new Date().toLocaleDateString()},...prev]);setWcIn("");setWcScan(null);}}} disabled={!wcIn.trim()} style={{...btn(wcIn.trim()?"#7A4A30":"#EAD9C4",wcIn.trim()?"#FDF8F0":"#9B7B5E"),flexShrink:0,borderRadius:6,padding:"6px 16px",fontSize:11,fontWeight:"bold",cursor:wcIn.trim()?"pointer":"default"}}>{wcScan&&wcScan.length>0?"Add Anyway":"Add"}</button>
          </div>
        </div>
        {wcE.length>0&&<div>
          <input value={wcSearch} onChange={e=>setWcSearch(e.target.value)} placeholder="Search..." style={{width:"100%",border:"1.5px solid #C8860A",borderRadius:6,padding:"7px 10px",fontSize:11,fontFamily:"sans-serif",color:"#3D2010",background:"#fff",boxSizing:"border-box",marginBottom:7}}/>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
            {["All",...WC_CATS].map(c=><button key={c} onClick={()=>setWcFilt(c)} style={{...btn(wcFilt===c?(CC[c]||"#7A4A30"):"#FFF8EE",wcFilt===c?"#FDF8F0":(CC[c]||"#7A4A30")),border:`1.5px solid ${CC[c]||"#C8860A"}`,borderRadius:20,padding:"3px 10px",fontSize:9,fontFamily:"sans-serif",fontWeight:"bold",whiteSpace:"nowrap"}}>{c}{c!=="All"&&` (${wcE.filter(e=>e.cat===c).length})`}</button>)}
          </div>
        </div>}
        {wcFil.length===0?<div style={{textAlign:"center",padding:"28px 0",color:"#B8A090",fontSize:11,fontFamily:"sans-serif"}}><div style={{fontSize:22,marginBottom:7}}>🎙</div>{wcE.length===0?"No entries yet.":"No entries match."}</div>:
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {wcFil.map(e=><div key={e.id} style={{border:"1.5px solid #E2D0BC",borderRadius:7,padding:"9px 11px",background:"#fff",borderLeft:`4px solid ${CC[e.cat]||"#C8860A"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <span style={{fontSize:8,fontFamily:"sans-serif",fontWeight:"bold",color:CC[e.cat]||"#C8860A",textTransform:"uppercase",background:`${CC[e.cat]||"#C8860A"}18`,borderRadius:20,padding:"2px 7px"}}>{e.cat}</span>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:8,fontFamily:"sans-serif",color:"#B8A090"}}>{e.date}</span>
                <button onClick={()=>setWcE(prev=>prev.filter(x=>x.id!==e.id))} style={{...btn("none","#D4A0A0"),fontSize:13,padding:"0 2px"}}>×</button>
              </div>
            </div>
            <p style={{margin:0,fontSize:12,color:"#3D2010",lineHeight:1.65,fontFamily:"Georgia,serif"}}>{e.text}</p>
          </div>)}
        </div>}
      </div>}

    </div>
    </div>
  </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Dash));
</script>

</body>
</html>
